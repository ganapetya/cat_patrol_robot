# ============================================================================
# Nav2 NAVIGATION half for cat_patrol_robot (living_room_v1).
# Localization half (map_server + amcl) is in amcl_params.yaml / Phase 2.
# Adapted from yahboomcar_nav/params/dwa_nav_params.yaml for this robot:
#   - costmaps consume /scan_filtered (trusted front arc), NOT /scan
#   - strafe disabled (mecanum slips on smooth floor); forward+yaw only
#   - generous inflation + realistic footprint
# ============================================================================

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # bt_navigator needs an ABSOLUTE path to the BT XML (a bare filename fails
    # to open). Point at the ones shipped with nav2_bt_navigator.
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"
    # plugin_lib_names left at the Nav2 defaults (the full stock list works);
    # see dwa_nav_params.yaml if you need to pin the exact set.

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.10   # crawl speed won't cover 0.5 m in 10 s -> false abort
      movement_time_allowance: 25.0    # give slow/gentle moves time before "no progress"
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15          # tight final POSITION (precision kept)
      yaw_goal_tolerance: 3.14         # RPP w/ use_rotate_to_heading:false can't hit a commanded
                                       # final heading -> must ignore yaw or the goal never completes.
                                       # (Position stays precise; final facing = arc arrival direction.)
      stateful: True

    # ========================================================================
    # ACTIVE CONTROLLER: Regulated Pure Pursuit (RPP).
    # Rolls through every turn instead of point-turning in place — the wheels
    # keep a rolling component (rolling traction >> scrubbing traction), which
    # is the pivot/arc idea generalized. No in-place spin => no left-fwd/
    # right-back scrub that fails on the slick floor.
    # To flip BACK to DWB: comment this block, uncomment the DWB block below,
    # and restart T4 (no rebuild).
    # ========================================================================
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.10          # crawl cruise
      lookahead_dist: 0.4
      min_lookahead_dist: 0.25
      max_lookahead_dist: 0.6
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: false
      transform_tolerance: 0.2
      # --- THE fix: never point-turn; couple forward motion with turning ---
      use_rotate_to_heading: false      # do NOT spin in place; arc instead
      allow_reversing: false
      # --- slow hard on tight curves to protect traction ---
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.6
      regulated_linear_scaling_min_speed: 0.05
      use_cost_regulated_linear_velocity_scaling: false
      max_angular_accel: 0.5            # gentle rotational break-away
      # --- gentle final approach ---
      min_approach_linear_velocity: 0.03
      approach_velocity_scaling_dist: 0.4
      max_robot_pose_search_dist: 10.0
      # --- collision checking along the projected arc ---
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0

    # ========================================================================
    # FALLBACK CONTROLLER: tuned DWB (point-turns). Commented out.
    # Uncomment this whole block AND comment the RPP FollowPath above to restore.
    # ========================================================================
    # FollowPath:
    #   plugin: "dwb_core::DWBLocalPlanner"
    #   debug_trajectory_details: True
    #   min_vel_x: 0.0
    #   min_vel_y: 0.0
    #   max_vel_x: 0.10          # crawl — traction over speed on slick floor
    #   max_vel_y: 0.0           # strafe OFF — rollers slip on smooth floor
    #   max_vel_theta: 0.25      # minimal in-place spin
    #   min_speed_xy: 0.0
    #   max_speed_xy: 0.10
    #   min_speed_theta: 0.0
    #   acc_lim_x: 0.5
    #   acc_lim_y: 0.0
    #   acc_lim_theta: 0.10      # very gentle break-away
    #   decel_lim_x: -0.5
    #   decel_lim_y: 0.0
    #   decel_lim_theta: -0.2
    #   vx_samples: 20
    #   vy_samples: 0
    #   vtheta_samples: 40
    #   sim_time: 1.5
    #   linear_granularity: 0.05
    #   angular_granularity: 0.025
    #   transform_tolerance: 0.2
    #   xy_goal_tolerance: 0.15
    #   trans_stopped_velocity: 0.05
    #   short_circuit_trajectory_evaluation: True
    #   stateful: True
    #   critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
    #   BaseObstacle.scale: 0.02
    #   PathAlign.scale: 32.0
    #   PathAlign.forward_point_distance: 0.1
    #   GoalAlign.scale: 24.0
    #   GoalAlign.forward_point_distance: 0.1
    #   PathDist.scale: 32.0
    #   GoalDist.scale: 24.0
    #   RotateToGoal.scale: 32.0
    #   RotateToGoal.slowing_factor: 10.0
    #   RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.18
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          obstacle_min_range: 0.1
          obstacle_max_range: 2.5
          raytrace_min_range: 0.0
          raytrace_max_range: 3.0
          clearing: True
          marking: True
          data_type: "LaserScan"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.25
        cost_scaling_factor: 3.0
      static_layer:
        map_subscribe_transient_local: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.18
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan_filtered
          obstacle_min_range: 0.1
          obstacle_max_range: 2.5
          raytrace_range: 3.0
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.25
        cost_scaling_factor: 3.0
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.3      # recovery spin also gentle (was 1.0) — same scrub problem
    min_rotational_vel: 0.2      # (was 0.4)
    rotational_acc_lim: 0.5      # gentle break-away for recovery spin (was 3.2)

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
